{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0"><i class="fas fa-file-excel me-2"></i> Importación Masiva de Cartera</h5>
        </div>
        <div class="card-body p-4">
            <p class="text-muted small">
                Suba el archivo <strong>clientes_prueba.xlsx</strong>. 
                Asegúrese de que la columna <code>asesor_usuario</code> coincida con los nombres de login.
            </p>
            
            <form id="formCarga" method="POST" enctype="multipart/form-data">
                <div class="mb-4">
                    <label class="form-label fw-bold">Seleccionar Archivo Excel</label>
                    <input type="file" name="archivo_excel" class="form-control" accept=".xlsx, .xls" required>
                    <div class="form-text">Solo archivos .xlsx o .xls</div>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" id="btnProcesar" class="btn btn-success">
                        <i class="fas fa-upload me-1"></i> Procesar e Importar
                    </button>
                    <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Volver</a>
                </div>
            </form> 
            </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('formCarga');
    
    form.addEventListener('submit', function(e) {
        const fileInput = document.querySelector('input[name="archivo_excel"]');
        const btn = document.getElementById('btnProcesar');
        const filePath = fileInput.value;
        const allowedExtensions = /(\.xlsx|\.xls)$/i;

        // 1. Validación de extensión en el cliente
        if (!allowedExtensions.exec(filePath)) {
            alert('Error: Por favor suba un archivo de Excel válido (.xlsx o .xls)');
            fileInput.value = '';
            e.preventDefault();
            return false;
        }
        
        // 2. Feedback visual y prevención de doble envío
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Procesando datos...';
        btn.classList.add('disabled');
    });
});
</script>
{% endblock %}
